name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and create tag
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          CURRENT_VERSION=$(grep '^version = ' gradle.properties | sed 's/version = //' | tr -d ' ')
          echo "Current version: $CURRENT_VERSION"
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            BUMP_TYPE="${{ github.event.inputs.bump }}"
          else
            BUMP_TYPE="patch"
          fi
          
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch|*)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"
          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          
          sed -i "s/^version = .*/version = $NEW_VERSION/" gradle.properties
          
          git add gradle.properties
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin HEAD:main
          
          git tag -a "$NEW_TAG" -m "Release $NEW_VERSION"
          git push origin "$NEW_TAG"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build shadow JAR
        run: gradle shadowJar

      - name: Verify build output
        run: ls -lh build/libs/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Lifesteal+ ${{ steps.version.outputs.version }}
          body: |
            ## Lifesteal+ ${{ steps.version.outputs.version }}
            
            ### Build Info
            - **Minecraft:** 1.21.1
            - **Java:** 21
            - **Platform:** PaperMC
            
            ### Installation
            1. Download `Lifesteal+.jar`
            2. Place in your server's `plugins/` folder
            3. Restart the server
            4. Edit `plugins/Lifesteal+/config.yml` as needed
            
            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/main) for details.
          files: build/libs/Lifesteal+.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
