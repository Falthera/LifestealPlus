settings:
  default-hearts: 10
  max-hearts: 20
  heart-steal-amount: 1.0
  heart-crystal-amount: 1.0
  heart-crystal-cooldown-seconds: 0
  withdraw-heart-amount: 1
  ban-reason: '&cYou ran out of hearts!'
  broadcast-death:
    enabled: true
    message: '<red><player> has run out of hearts!'
  revival-delay-ticks: 40
  revival-hearts-restored: 3
  revival-broadcast:
    enabled: true
    message: '<green><player> has been revived by <reviver>!'
  hot-reload: false
combat-log:
  enabled: true
  duration-seconds: 30
trust:
  enabled: true
grace-period:
  enabled: true
  duration-seconds: 1800
  bossbar-title: "<red>Grace Period: <time>"
anti-op-abuse:
  enabled: true
  announce-to: all
  exclude-commands:
    - "w"
    - "tell"
    - "msg"
    - "dm"
    - "whisper"
    - "reply"
    - "r"
  tracked-commands:
    - "gamemode"
    - "tp"
    - "teleport"
    - "give"
    - "effect"
    - "enchant"
    - "kill"
    - "op"
    - "deop"
    - "ban"
    - "banip"
    - "unban"
    - "pardon"
    - "kick"
    - "mute"
    - "god"
    - "heal"
    - "feed"
    - "fly"
    - "speed"
    - "xp"
    - "summon"
    - "setblock"
    - "fill"
    - "clone"
    - "time"
    - "weather"
    - "difficulty"
    - "defaultgamemode"
    - "whitelist"
    - "stop"
    - "reload"
    - "restart"
    - "shutdown"
    - "save"
    - "save-all"

discord-leaderboard:
  enabled: false
  webhook-url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_URL"
  interval-ticks: 6000
  top: 10
  title: "Lifesteal+ Top Killers"

database:
  type: sqlite
  sqlite:
    file: lifesteal.db
  async: true
