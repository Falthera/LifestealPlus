name: LifestealPlus
main: dev.lifesteal.Lifesteal
version: 2.0.0
api-version: '1.21.11'
author: LifestealPlus Authors
description: A production-ready Lifesteal plugin for PaperMC
softdepend: [PlaceholderAPI, Vault]
commands:
  lifesteal:
    description: Main LifestealPlus command
    usage: /<command>
    aliases: [ls, hearts, lifesteal]
  withdraw:
    description: Withdraw hearts to heart crystals
    usage: /withdraw <amount>
    permission: lifesteal.withdraw
  archetype:
    description: View your archetype
    usage: /archetype
    permission: lifesteal.gui
permissions:
  lifesteal.admin:
    description: Full admin access
    default: op
  lifesteal.reload:
    description: Reload configuration
    default: op
  lifesteal.hearts:
    description: Manage hearts
    default: op
  lifesteal.revive:
    description: Revive players
    default: op
  lifesteal.archetype:
    description: Manage archetypes
    default: op
  lifesteal.gui:
    description: Open GUI
    default: op
  lifesteal.give:
    description: Give items
    default: op
  lifesteal.withdraw:
    description: Withdraw hearts
    default: op
  lifesteal.bypass:
    description: Bypass archetype restrictions
    default: op
  lifesteal.leaderboard:
    description: Send Discord leaderboard
    default: op