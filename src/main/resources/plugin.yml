name: LifestealPlus
main: dev.lifesteal.Lifesteal
version: ${project.version}
api-version: '1.21'
author: Falthera
description: Lifesteal SMP plugin — lose hearts on death, gain hearts on kill.

commands:
  hearts:
    description: Main Lifesteal+ command
    usage: /<command> <subcommand>
    aliases: [lifesteal, ls]
  withdraw:
    description: Withdraw hearts into a heart crystal item
    usage: /<command> <amount>
  archetype:
    description: Manage your or another player's archetype
    usage: /<command> <player> <archetype>

permissions:
  lifesteal.reload:
    description: Allows reloading the plugin config
    default: op
  lifesteal.give:
    description: Allows giving hearts or revival totems
    default: op
  lifesteal.revive:
    description: Allows using revival totems
    default: op
  lifesteal.archetype:
    description: Allows setting archetypes for other players
    default: op
  lifesteal.hearts:
    description: Allows viewing and managing hearts
    default: op
  lifesteal.leaderboard:
    description: Allows sending the leaderboard to Discord
    default: op
  lifesteal.gui:
    description: Allows opening the archetype selection GUI
    default: true
  lifesteal.withdraw:
    description: Allows withdrawing hearts as items
    default: true
  lifesteal.trust:
    description: Allows managing trusted players
    default: true
  lifesteal.give:
    description: Give items
    default: op
  lifesteal.withdraw:
    description: Withdraw hearts
    default: true
  lifesteal.bypass:
    description: Bypass archetype restrictions
    default: op
  lifesteal.leaderboard:
    description: Send Discord leaderboard
    default: op